name: Build Rockchip Linux 6.1 Kernel

on:
  workflow_dispatch: # 允许你在网页上点击按钮手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo docker image prune -a -f

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git binfmt-support qemu-user-static gcc-10-aarch64-linux-gnu g++-10-aarch64-linux-gnu \
        build-essential libncurses-dev bison flex libssl-dev libelf-dev bc u-boot-tools kmod ccache bzip2 lz4 p7zip-full

    - name: Compile Kernel
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        # 1. 载入默认的 Rockchip 配置 (这里以标准的 rockchip_defconfig 为例)
        # 注意：如果 unifreq 有特定的 config 名字，可以在 arch/arm64/configs/ 目录下查看并替换
        make defconfig
        
        # 2. 开始多线程编译内核镜像、设备树和模块
        echo "Starting kernel compilation..."
        make -j$(nproc) Image dtbs modules

    - name: Pack Modules
      run: |
        mkdir -p output/lib/modules
        make modules_install INSTALL_MOD_PATH=./output/
        cp arch/arm64/boot/Image ./output/
        # 将编译出来的 dtb 复制出来（也可以根据你的板子型号指定具体的 dtb 文件）
        cp arch/arm64/boot/dts/rockchip/*.dtb ./output/ 2>/dev/null || true
        
        cd output && tar -czf ../kernel-artifacts.tar.gz *

    - name: Upload Artifacts
      uses: actions/artifacts/upload-artifact@v4
      with:
        name: rockchip-kernel-6.1
        path: kernel-artifacts.tar.gz
